<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aperio — Офлайн</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        background: #f2f2f5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        color: #0f0e13;
      }
      .card {
        text-align: center;
        padding: 2.5rem 2rem;
        background: #fff;
        border-radius: 1.25rem;
        box-shadow: 0 4px 24px rgba(0,0,0,.08);
        max-width: 360px;
        width: 90%;
      }
      .icon { font-size: 3rem; margin-bottom: 1rem; }
      h1 { font-size: 1.375rem; font-weight: 600; margin-bottom: .5rem; }
      p { color: #4a4757; font-size: .9375rem; line-height: 1.5; margin-bottom: 1.5rem; }
      button {
        background: #7c6af7;
        color: #fff;
        border: none;
        border-radius: .75rem;
        padding: .75rem 2rem;
        font-size: 1rem;
        cursor: pointer;
        transition: opacity .15s;
      }
      button:hover { opacity: .85; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>Немає з'єднання</h1>
      <p>Перевірте підключення до інтернету та спробуйте ще раз.</p>
      <button onclick="location.reload()">Оновити</button>
    </div>
  </body>
</html>
